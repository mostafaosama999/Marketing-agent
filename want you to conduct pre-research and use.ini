  AI Detection & Humanization: The Full Landscape

  Part 1: How AI Detection Actually Works

  AI detectors aren't magic. They measure statistical patterns in your text. Here are the core methods:

  1. Perplexity (the most important signal)

  Perplexity measures how predictable your word choices are. When an LLM generates text, it picks the most statistically likely next word at each step. This makes AI text highly
  predictable (low perplexity, scores of 5-10). Human writing is messier and less predictable (perplexity 20-50+).

  Example:
  - AI writes: "The meeting was very productive" -- every word is the most expected next word. Low perplexity.
  - Human writes: "The meeting was oddly electric" -- "oddly electric" is unexpected. High perplexity.

  2. Burstiness (sentence rhythm)

  Burstiness measures variation in sentence length and complexity across a document. Humans naturally write in bursts: a short punchy sentence, then a long complex one, then a medium
  one. AI generates eerily uniform sentence lengths (all 18-22 words). Low burstiness = AI signal.

  3. Transformer-Based Classifiers (the state of the art)

  The best modern detectors (GPTZero, Originality.ai) don't just use perplexity/burstiness anymore. They use fine-tuned RoBERTa models trained on millions of human vs. AI text pairs.
  These output a 0-1 probability score. GPTZero uses a "7-component multilayered system" that goes well beyond the two basic metrics.

  4. Vocabulary & Structural Fingerprinting

  Detectors also look for:
  - Overused AI words: "delve," "tapestry," "vibrant," "leverage," "robust," "pivotal," "nuanced," "multifaceted," "paradigm," "holistic," "groundbreaking," "transformative"
  - Formulaic transitions: "Furthermore," "Moreover," "Additionally," "It is worth noting that"
  - Structural uniformity: Every paragraph starts with a topic sentence, ends with a summary, same heading format throughout
  - Uniform emotional register: No tonal shifts, no opinions, no uncertainty

  5. Watermarking (Google SynthID)

  A different approach entirely: during generation, the AI system embeds a cryptographic signature by slightly biasing token selection. This is undetectable to humans but statistically
  detectable by the matching tool. Google's SynthID has watermarked 10+ billion pieces of content. This only works for content generated by participating platforms.

