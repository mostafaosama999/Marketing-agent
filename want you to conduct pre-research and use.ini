  The 4-Pass Workflow (Most Effective)

  1. AI generates outline + key claims only (not prose)
  2. Human writes opening paragraph and any personal/opinion sections
  3. AI generates body with constrained prompt (see below)
  4. Human editor rearranges 60%+ of paragraph openings, swaps 5-8 formal terms per 500 words, adds 2-3 personal asides

  This achieves a 94% detection drop in documented benchmarks.

  The Constrained Prompt Template

  Add this to any content generation prompt:

  Write in a conversational, slightly opinionated tone. Vary sentence length dramatically -- some 3-5 words, some 35+ words. Never start paragraphs with topic sentences. Avoid these
  words entirely: delve, tapestry, vibrant, leverage, synergy, robust, pivotal, transformative, streamline, foster, nuanced, multifaceted, paradigm, holistic. Do not use "Furthermore,"
  "Moreover," or "Additionally" as transitions. Include 1-2 sentences per 500 words where you change direction mid-thought or acknowledge a limitation. Use contractions. Add specific
  dates, numbers, and names where possible.

  Model Choice Matters

  - Claude produces the lowest raw detection scores (67% vs GPT-4's 89% on Turnitin)
  - The "Frankenstein Method" (blend outputs from Claude + GPT + another model before editing) breaks any single model's fingerprint

